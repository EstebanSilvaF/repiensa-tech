openapi: 3.0.3
info:
  title: Re-Pensa Tech API
  description: |
    API REST del marketplace universitario Re-Pensa Tech.

    - Prefijo de rutas de negocio: `/api`
    - Autenticación: JWT Bearer
    -
    - Errores: `{ "message": "..." }`

    Documentación complementaria: `FRONTEND_API.md`
  version: 1.0.0
  contact:
    name: Re-Pensa Tech

servers:
  - url: http://localhost:3000
    description: Desarrollo local

tags:
  - name: Health
  - name: Auth
  - name: Universities
  - name: Upload
  - name: Products
  - name: Chats
  - name: Reservations
  - name: Transactions
  - name: Notifications

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    User:
      type: object
      properties:
        id:
          type: string
        university_id:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [student, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    University:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email_domain:
          type: string
        subscription_status:
          type: string
          enum: [active, inactive, expired]
        subscription_start:
          type: string
          format: date-time
          nullable: true
        subscription_end:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [university_id, full_name, email, password]
      properties:
        university_id:
          type: string
        full_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        seller_id:
          type: string
        university_id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        is_donation:
          type: boolean
        category:
          type: string
        condition:
          type: string
          enum: [new, good, regular]
        status:
          type: string
          enum: [available, reserved, sold]
        image_url:
          type: string
          nullable: true
        image_public_id:
          type: string
          nullable: true
        seller_name:
          type: string
        seller_email:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required: [name, description, category, condition, image_url]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        is_donation:
          type: boolean
        category:
          type: string
        condition:
          type: string
          enum: [new, good, regular]
        image_url:
          type: string
        image_public_id:
          type: string

    UploadProductImageResponse:
      type: object
      properties:
        image_url:
          type: string
        image_public_id:
          type: string
        width:
          type: integer
        height:
          type: integer

    Chat:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        buyer_id:
          type: string
        seller_id:
          type: string
        status:
          type: string
          enum: [open, delivery_confirmed]
        last_message:
          type: string
          nullable: true
        last_message_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    OpenChatRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string

    Message:
      type: object
      properties:
        id:
          type: string
        chat_id:
          type: string
        sender_id:
          type: string
        content:
          type: string
          nullable: true
        type:
          type: string
          enum: [text, appointment]
        appointment:
          type: object
          nullable: true
          properties:
            day:
              type: string
            time:
              type: string
            location:
              type: string
        sender_name:
          type: string
        created_at:
          type: string
          format: date-time

    SendMessageRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, appointment]
        content:
          type: string
        appointment:
          type: object
          properties:
            day:
              type: string
            time:
              type: string
            location:
              type: string

    Reservation:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        buyer_id:
          type: string
        fee_paid:
          type: number
        status:
          type: string
          enum: [active, completed, expired]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    ReserveProductRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string

    Transaction:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        buyer_id:
          type: string
        seller_id:
          type: string
        amount:
          type: number
        direction:
          type: string
          enum: [purchase, sale]
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string
        is_read:
          type: boolean
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    NotificationsResponse:
      type: object
      properties:
        unread:
          type: integer
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'

    CreateUniversityRequest:
      type: object
      required: [name, email_domain]
      properties:
        name:
          type: string
        email_domain:
          type: string
        subscription_start:
          type: string
          format: date-time
        subscription_end:
          type: string
          format: date-time

    UpdateUniversityStatusRequest:
      type: object
      required: [subscription_status]
      properties:
        subscription_status:
          type: string
          enum: [active, inactive, expired]

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Servidor operativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registrar usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario creado (sin token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validación o regla de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token JWT y datos del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/auth/change-password:
    patch:
      tags: [Auth]
      summary: Cambiar contraseña
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Contraseña actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/universities:
    get:
      tags: [Universities]
      summary: Listar universidades (público)
      security: []
      responses:
        '200':
          description: Lista de universidades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/University'
    post:
      tags: [Universities]
      summary: Crear universidad (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUniversityRequest'
      responses:
        '201':
          description: Universidad creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/University'

  /api/universities/{id}/status:
    patch:
      tags: [Universities]
      summary: Actualizar estado de suscripción (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUniversityStatusRequest'
      responses:
        '200':
          description: Universidad actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/University'

  /api/upload/product-image:
    post:
      tags: [Upload]
      summary: Subir imagen de producto a Cloudinary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: URL de imagen subida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadProductImageResponse'

  /api/products:
    get:
      tags: [Products]
      summary: Galería de productos disponibles
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: condition
          in: query
          schema:
            type: string
            enum: [new, good, regular]
        - name: is_donation
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Productos de la universidad del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags: [Products]
      summary: Publicar producto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /api/products/mine:
    get:
      tags: [Products]
      summary: Mis productos publicados
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Productos del usuario autenticado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /api/products/generate-description:
    post:
      tags: [Products]
      summary: Generar descripción con IA a partir de imagen
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Descripción generada
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Detalle de producto
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags: [Products]
      summary: Eliminar producto (solo dueño, estado available)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/chats:
    get:
      tags: [Chats]
      summary: Listar mis chats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conversaciones del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Chat'
    post:
      tags: [Chats]
      summary: Abrir chat sobre un producto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenChatRequest'
      responses:
        '201':
          description: Chat creado o existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'

  /api/chats/{id}:
    get:
      tags: [Chats]
      summary: Detalle de chat
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chat encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'

  /api/chats/{id}/messages:
    get:
      tags: [Chats]
      summary: Mensajes del chat
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mensajes en orden cronológico
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
    post:
      tags: [Chats]
      summary: Enviar mensaje
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Mensaje enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/chats/{id}/messages/{messageId}/appointment:
    patch:
      tags: [Chats]
      summary: Responder a propuesta de encuentro
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [accepted, rejected]
      responses:
        '200':
          description: Mensaje actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /api/chats/{id}/confirm-delivery:
    patch:
      tags: [Chats]
      summary: Confirmar entrega y registrar transacción
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entrega confirmada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/reservations:
    get:
      tags: [Reservations]
      summary: Mis reservas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reservas del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
    post:
      tags: [Reservations]
      summary: Reservar producto ($2.000 COP, 7 días)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveProductRequest'
      responses:
        '201':
          description: Reserva creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /api/transactions:
    get:
      tags: [Transactions]
      summary: Historial de compras y ventas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Transacciones del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'

  /api/notifications:
    get:
      tags: [Notifications]
      summary: Listar notificaciones
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Últimas 50 notificaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsResponse'

  /api/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Marcar todas como leídas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notificaciones actualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Marcar una notificación como leída
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notificación actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
