services:
  postgres:
    image: postgres:16
    container_name: repiensa-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repensatech
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: on-failure

  mongodb:
    image: mongo:8
    container_name: repensa-mongo
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    image: esteban003/repiensa-backend:latest
    container_name: repiensa-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/repensatech
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/repensatech
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    depends_on:
      - postgres
      - mongodb
    restart: on-failure

  frontend:
    image: esteban003/repiensa-frontend:latest
    container_name: repiensa-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

  k6:
    image: grafana/k6:0.57.0
    container_name: repensa-k6
    profiles:
      - load
    depends_on:
      - backend
    environment:
      BASE_URL: http://backend:3000
      K6_TEST_USER: maria.rodriguez@uniempresarial.edu.co
      K6_TEST_PASSWORD: Estudiante1!
      K6_PRODUCT_ID: clprodarduino001
    volumes:
      - ./k6:/scripts
    entrypoint: ["k6"]

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    profiles:
      - sonar
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles:
      - sonar
    depends_on:
      - sonarqube
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      SONAR_LOGIN: ${SONAR_TOKEN}
    volumes:
      - .:/usr/src
    working_dir: /usr/src

volumes:
  postgres_data:
  mongo_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
